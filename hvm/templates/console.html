<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ panel_name }} // NEURAL LINK: {{ vps.container_name }}</title>
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Xterm.js -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-web-links@0.9.0/lib/xterm-addon-web-links.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-search@0.13.0/lib/xterm-addon-search.min.js"></script>
    
    <!-- Socket.IO client -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

    <style>
        :root {
            --bg-darker: #050507;
            --bg-card: rgba(13, 13, 18, 0.9);
            --border-glow: rgba(0, 242, 255, 0.3);
            --accent-primary: #00f2ff;
            --accent-secondary: #7000ff;
            --accent-success: #00ff9d;
            --accent-danger: #ff0055;
            --text-primary: #e0e0e0;
            --text-muted: #6b7280;
            --font-mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
        }

        body {
            background-color: var(--bg-darker);
            color: var(--text-primary);
            font-family: var(--font-mono);
            height: 100vh;
            overflow: hidden;
            margin: 0;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* CRT/Scanline Effect */
        body::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2000;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
            opacity: 0.1;
        }

        /* Top Bar */
        .cyber-header {
            background: rgba(5, 5, 7, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--accent-primary);
            padding: 0.75rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 100;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.15);
        }

        .system-id {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .id-badge {
            background: rgba(0, 242, 255, 0.1);
            border: 1px solid var(--accent-primary);
            padding: 0.5rem 1rem;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: 800;
            color: var(--accent-primary);
            text-transform: uppercase;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .id-badge i { font-size: 1rem; }

        .conn-pulse {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--text-muted);
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-muted);
            box-shadow: 0 0 5px currentColor;
        }

        .pulse-dot.online { background: var(--accent-success); box-shadow: 0 0 10px var(--accent-success); animation: pulse 2s infinite; }
        .pulse-dot.error { background: var(--accent-danger); box-shadow: 0 0 10px var(--accent-danger); }
        .pulse-dot.connecting { background: #ffb800; animation: blink 1s infinite; }

        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.5); opacity: 0.5; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }

        /* Terminal Container */
        .terminal-mainframe {
            flex: 1;
            padding: 1.5rem;
            position: relative;
            background: radial-gradient(circle at center, rgba(0, 242, 255, 0.03) 0%, transparent 70%);
        }

        #terminal {
            width: 100%;
            height: 100%;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.85);
            padding: 1rem;
            box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        /* Control Panel (Right Side) */
        .cyber-actions {
            display: flex;
            gap: 1rem;
        }

        .cyber-btn {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            padding: 0.5rem 1.25rem;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .cyber-btn:hover {
            background: rgba(0, 242, 255, 0.1);
            border-color: var(--accent-primary);
            color: var(--accent-primary);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 242, 255, 0.2);
        }

        .cyber-btn.danger:hover {
            background: rgba(255, 0, 85, 0.1);
            border-color: var(--accent-danger);
            color: var(--accent-danger);
            box-shadow: 0 5px 15px rgba(255, 0, 85, 0.2);
        }

        /* Footer */
        .cyber-footer {
            background: rgba(5, 5, 7, 0.95);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding: 0.5rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        .hotkey-list { display: flex; gap: 2rem; }
        .hotkey-item kbd {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            color: var(--accent-primary);
            font-family: inherit;
        }

        /* Login Overlay */
        .matrix-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(5, 5, 7, 0.98);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1500;
            transition: opacity 0.5s ease;
        }

        .login-matrix-card {
            background: rgba(13, 13, 18, 0.9);
            border: 2px solid var(--accent-primary);
            border-radius: 12px;
            width: 450px;
            padding: 3rem;
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.1);
            position: relative;
        }

        .login-matrix-card h2 {
            font-size: 1.5rem;
            font-weight: 900;
            letter-spacing: 4px;
            text-align: center;
            margin-bottom: 2.5rem;
            color: var(--accent-primary);
            text-transform: uppercase;
        }

        .matrix-input-group { margin-bottom: 1.5rem; }
        .matrix-input-group label {
            display: block;
            font-size: 0.7rem;
            font-weight: 800;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 0.5rem;
            letter-spacing: 2px;
        }

        .matrix-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            padding: 0.85rem 1rem;
            color: var(--text-primary);
            font-family: var(--font-mono);
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .matrix-input:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.1);
            background: rgba(0, 0, 0, 0.8);
        }

        .matrix-btn {
            width: 100%;
            background: var(--accent-primary);
            color: #000;
            border: none;
            padding: 1rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            border-radius: 4px;
            margin-top: 1rem;
            transition: all 0.3s ease;
        }

        .matrix-btn:hover {
            background: #fff;
            box-shadow: 0 0 30px var(--accent-primary);
            transform: translateY(-3px);
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-darker); }
        ::-webkit-scrollbar-thumb { background: rgba(0, 242, 255, 0.2); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent-primary); }
    </style>
</head>
<body>

    <div id="loginOverlay" class="matrix-overlay">
        <div class="login-matrix-card">
            <h2>Neural Interface</h2>
            <div class="matrix-input-group">
                <label>Target Host</label>
                <input type="text" id="sshHost" class="matrix-input" value="{{ vps_ip or '' }}" placeholder="IP_ADDRESS">
            </div>
            <div class="matrix-input-group">
                <label>Protocol Port</label>
                <input type="number" id="sshPort" class="matrix-input" value="22">
            </div>
            <div class="matrix-input-group">
                <label>User Identifier</label>
                <input type="text" id="sshUser" class="matrix-input" value="root">
            </div>
            <div class="matrix-input-group">
                <label>Access Credential</label>
                <input type="password" id="sshPass" class="matrix-input" placeholder="••••••••">
            </div>
            <button class="matrix-btn" id="connectBtn">Establish Link</button>
            <p style="text-align: center; font-size: 0.65rem; color: var(--text-muted); margin-top: 2rem;">
                > ENCRYPTION: AES-256-GCM<br>
                > STATUS: READY FOR UPLINK
            </p>
        </div>
    </div>

    <header class="cyber-header">
        <div class="system-id">
            <div class="id-badge">
                <i class="fas fa-microchip"></i>
                {{ vps.container_name }}
            </div>
            <div class="conn-pulse">
                <span class="pulse-dot" id="statusLed"></span>
                <span id="statusText">LINK OFFLINE</span>
            </div>
        </div>

        <div class="cyber-actions">
            <button class="cyber-btn" onclick="reconnect()" id="reconnectBtn">
                <i class="fas fa-sync-alt"></i> SYNC
            </button>
            <button class="cyber-btn" onclick="toggleFullscreen()" id="fullBtn">
                <i class="fas fa-expand"></i> GRID
            </button>
            <button class="cyber-btn danger" onclick="closeTerminal()">
                <i class="fas fa-power-off"></i> TERMINATE
            </button>
        </div>
    </header>

    <main class="terminal-mainframe">
        <div id="terminal"></div>
    </main>

    <footer class="cyber-footer">
        <div class="hotkey-list">
            <div class="hotkey-item"><kbd>ALT</kbd> + <kbd>C</kbd> Copy</div>
            <div class="hotkey-item"><kbd>ALT</kbd> + <kbd>V</kbd> Paste</div>
            <div class="hotkey-item"><kbd>ESC</kbd> Fullscreen</div>
        </div>
        <div>{{ panel_name }} // CORE v5.1-PRO-ULTIMATE</div>
    </footer>

    <script>
        let socket, term, fitAddon;
        const vps_id = "{{ vps.id }}";

        document.addEventListener('DOMContentLoaded', function() {
            // Init Xterm
            term = new Terminal({
                cursorBlink: true,
                fontFamily: 'var(--font-mono)',
                fontSize: 14,
                theme: {
                    background: 'transparent',
                    foreground: '#e0e0e0',
                    cursor: '#00f2ff',
                    selection: 'rgba(0, 242, 255, 0.3)',
                    black: '#000000',
                    red: '#ff0055',
                    green: '#00ff9d',
                    yellow: '#ffb800',
                    blue: '#00f2ff',
                    magenta: '#7000ff',
                    cyan: '#00f2ff',
                    white: '#ffffff'
                },
                allowTransparency: true,
                scrollback: 5000
            });

            fitAddon = new FitAddon.FitAddon();
            term.loadAddon(fitAddon);
            term.loadAddon(new WebLinksAddon.WebLinksAddon());
            term.loadAddon(new SearchAddon.SearchAddon());
            
            term.open(document.getElementById('terminal'));
            fitAddon.fit();

            window.addEventListener('resize', () => {
                fitAddon.fit();
                if (socket && socket.connected) {
                    socket.emit('resize', { 
                        cols: term.cols, 
                        rows: term.rows,
                        vps_id: vps_id 
                    });
                }
            });

            // Connect Logic
            document.getElementById('connectBtn').addEventListener('click', startSession);
            document.getElementById('sshPass').addEventListener('keypress', (e) => {
                if(e.key === 'Enter') startSession();
            });
        });

        function startSession() {
            const host = document.getElementById('sshHost').value;
            const port = document.getElementById('sshPort').value;
            const user = document.getElementById('sshUser').value;
            const pass = document.getElementById('sshPass').value;

            if(!host || !user) return alert('Link parameters incomplete');

            document.getElementById('connectBtn').disabled = true;
            document.getElementById('connectBtn').innerText = 'ENCRYPTING...';
            
            initSocket(host, port, user, pass);
        }

        function initSocket(host, port, user, pass) {
            socket = io({
                query: { vps_id: vps_id }
            });

            socket.on('connect', () => {
                updateStatus('connecting', 'LINKING...');
                socket.emit('start_ssh', {
                    host, port, user, password: pass,
                    vps_id: vps_id,
                    cols: term.cols,
                    rows: term.rows
                });
            });

            socket.on('ssh_output', (data) => {
                if (data.vps_id == vps_id) {
                    term.write(data.output);
                }
            });

            socket.on('ssh_connected', () => {
                updateStatus('online', 'LINK STABLE');
                document.getElementById('loginOverlay').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loginOverlay').style.display = 'none';
                    term.focus();
                }, 500);
            });

            socket.on('ssh_error', (data) => {
                alert('Neural error: ' + data.message);
                updateStatus('error', 'LINK FAILED');
                document.getElementById('connectBtn').disabled = false;
                document.getElementById('connectBtn').innerText = 'ESTABLISH LINK';
            });

            socket.on('disconnect', () => {
                updateStatus('error', 'LINK SEVERED');
            });

            term.onData(data => {
                if (socket && socket.connected) {
                    socket.emit('ssh_input', { 
                        vps_id: vps_id, 
                        input: data 
                    });
                }
            });
        }

        function updateStatus(type, text) {
            const led = document.getElementById('statusLed');
            const txt = document.getElementById('statusText');
            led.className = 'pulse-dot ' + type;
            txt.innerText = text;
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
            }
        }

        function closeTerminal() {
            if(confirm('Terminate neural link?')) {
                window.location.href = '/vps/' + vps_id;
            }
        }

        function reconnect() {
            window.location.reload();
        }

        // Hotkeys
        document.addEventListener('keydown', e => {
            if(e.altKey && e.key === 'c') {
                const selection = term.getSelection();
                if(selection) navigator.clipboard.writeText(selection);
            }
            if(e.altKey && e.key === 'v') {
                navigator.clipboard.readText().then(text => {
                    socket.emit('ssh_input', { vps_id: vps_id, input: text });
                });
            }
        });
    </script>
</body>
</html>
            <button class="btn" id="reconnectBtn" title="Reconnect"><i class="fa-solid fa-rotate-right"></i></button>
            <button class="btn btn-exit" id="exitBtn" title="Exit console"><i class="fa-regular fa-circle-xmark"></i> Exit</button>
        </div>
    </div>

    <!-- Terminal lives here -->
    <div id="terminal-container"></div>

    <!-- Footer hints -->
    <div class="console-footer">
        <span class="footer-hint"><i class="fa-regular fa-keyboard"></i> Ctrl+C / Ctrl+Z work natively</span>
        <span class="footer-hint"><i class="fa-regular fa-clipboard"></i> Paste: Ctrl+Shift+V / right-click</span>
        <span class="footer-hint"><i class="fa-regular fa-arrow-left"></i> Disconnect does NOT stop your VPS</span>
    </div>

    <!-- scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
    <!-- fit addon for terminal resize -->
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>

    <script>
        (function() {
            // --- Configuration ---
            const vpsId = {{ vps.id }};
            const socket = io(window.location.origin, {
                transports: ['websocket', 'polling'],
                path: '/socket.io'
            });

            // Xterm terminal
            const term = new Terminal({
                cursorBlink: true,
                cursorStyle: 'block',
                fontSize: 14,
                fontFamily: 'JetBrains Mono, Fira Code, monospace',
                theme: {
                    background: '#0c0e12',
                    foreground: '#e6eef9',
                    cursor: '#0dcaf0',
                    selectionBackground: '#2d4c7c',
                    black: '#2e343a',
                    red: '#f07178',
                    green: '#a3d6a3',
                    yellow: '#ffcb6b',
                    blue: '#5fa3e0',
                    magenta: '#d39ad4',
                    cyan: '#7fdbdb',
                    white: '#eef4f9',
                },
                scrollback: 5000,
                tabStopWidth: 4,
            });

            const fitAddon = new FitAddon.FitAddon();
            term.loadAddon(fitAddon);

            // DOM elements
            const overlay = document.getElementById('sshOverlay');
            const statusLed = document.getElementById('statusLed');
            const statusText = document.getElementById('statusText');
            const connectBtn = document.getElementById('connectBtn');
            const sshHost = document.getElementById('sshHost');
            const sshPort = document.getElementById('sshPort');
            const sshUser = document.getElementById('sshUser');
            const sshPass = document.getElementById('sshPass');
            const reconnectBtn = document.getElementById('reconnectBtn');
            const exitBtn = document.getElementById('exitBtn');
            const fullscreenBtn = document.getElementById('fullscreenBtn');
            const terminalContainer = document.getElementById('terminal-container');

            // State
            let connected = false;
            let connecting = false;
            let connectionInfo = null;

            // --- helper: update status UI ---
            function setStatus(state, msg) {
                statusLed.className = 'status-led';
                if (state === 'connected') {
                    statusLed.classList.add('connected');
                    statusText.innerText = msg || 'Connected';
                } else if (state === 'connecting') {
                    statusLed.classList.add('connecting');
                    statusText.innerText = msg || 'Connecting...';
                } else if (state === 'disconnected') {
                    statusLed.classList.add('disconnected');
                    statusText.innerText = msg || 'Disconnected';
                }
            }

            // --- open terminal and attach listeners ---
            function openTerminal() {
                term.open(terminalContainer);
                fitAddon.fit();
                term.focus();
            }

            // Initially open terminal (blank, but UI ready)
            openTerminal();

            // --- Auto-fetch connection details on load ---
            async function fetchConnectionDetails() {
                try {
                    setStatus('connecting', 'Preparing connection...');
                    term.writeln('\x1b[36m[ Fetching SSH connection details... ]\x1b[0m\r\n');
                    
                    const response = await fetch(`/vps/${vpsId}/console/connect`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        }
                    });
                    
                    const data = await response.json();
                    
                    if (data.success) {
                        connectionInfo = data.connection;
                        
                        // Auto-fill the form
                        sshHost.value = connectionInfo.host;
                        sshPort.value = connectionInfo.port;
                        sshUser.value = connectionInfo.username;
                        sshPass.value = connectionInfo.password;
                        
                        term.writeln('\x1b[32m✓ Connection details retrieved\x1b[0m');
                        if (data.port_created) {
                            term.writeln('\x1b[33m✓ SSH port forward created automatically\x1b[0m');
                        }
                        term.writeln('\x1b[36m✓ Password retrieved from VPS\x1b[0m');
                        term.writeln('\r\n\x1b[1mReady to connect!\x1b[0m\r\n');
                        
                        setStatus('disconnected', 'Ready to connect');
                        
                        // Auto-connect after 1 second
                        setTimeout(() => {
                            if (!connected && !connecting) {
                                term.writeln('\x1b[36m[ Auto-connecting in 3 seconds... Press any key to cancel ]\x1b[0m\r\n');
                                let autoConnectTimer = setTimeout(() => {
                                    initiateConnection();
                                }, 3000);
                                
                                // Cancel auto-connect if user presses any key
                                const cancelAutoConnect = () => {
                                    clearTimeout(autoConnectTimer);
                                    term.writeln('\x1b[33m[ Auto-connect cancelled ]\x1b[0m\r\n');
                                    term.off('key', cancelAutoConnect);
                                };
                                term.on('key', cancelAutoConnect);
                            }
                        }, 1000);
                        
                    } else {
                        term.writeln('\x1b[31m✗ Failed to get connection details: ' + data.error + '\x1b[0m\r\n');
                        term.writeln('\x1b[33mPlease enter connection details manually.\x1b[0m\r\n');
                        setStatus('disconnected', 'Manual setup required');
                    }
                } catch (error) {
                    console.error('Failed to fetch connection details:', error);
                    term.writeln('\x1b[31m✗ Error: ' + error.message + '\x1b[0m\r\n');
                    term.writeln('\x1b[33mPlease enter connection details manually.\x1b[0m\r\n');
                    setStatus('disconnected', 'Manual setup required');
                }
            }

            // Call on page load
            fetchConnectionDetails();

            // --- socket event handlers ---
            socket.on('connect', () => {
                console.log('Socket.io connected');
            });

            socket.on('ssh_connected', (data) => {
                console.log('SSH channel established', data);
                connecting = false;
                connected = true;
                overlay.classList.add('d-none');
                setStatus('connected', `SSH ${data.username}@${data.host}:${data.port}`);
                term.clear();
                term.writeln('\x1b[1;32m╔═══════════════════════════════════════════════════════════╗\x1b[0m');
                term.writeln('\x1b[1;32m║           Connected to ' + '{{ vps.container_name }}'.padEnd(32) + '║\x1b[0m');
                term.writeln('\x1b[1;32m╚═══════════════════════════════════════════════════════════╝\x1b[0m\r\n');
                term.focus();
            });

            socket.on('ssh_output', (data) => {
                term.write(data);
            });

            socket.on('ssh_error', (err) => {
                console.error('SSH error:', err.error);
                connecting = false;
                connected = false;
                setStatus('disconnected', 'Error');
                overlay.classList.remove('d-none');
                term.writeln('\r\n\x1b[1;31m╔═══════════════════════════════════════════════════════════╗\x1b[0m');
                term.writeln('\x1b[1;31m║                    SSH CONNECTION ERROR                    ║\x1b[0m');
                term.writeln('\x1b[1;31m╚═══════════════════════════════════════════════════════════╝\x1b[0m');
                term.writeln('\r\n\x1b[31m' + (err.error || 'Connection failed') + '\x1b[0m');
                term.writeln('\r\n\x1b[33mPlease check credentials and try again.\x1b[0m\r\n');
            });

            socket.on('ssh_disconnected', () => {
                console.log('SSH disconnected by server');
                connected = false;
                connecting = false;
                setStatus('disconnected', 'Disconnected');
                overlay.classList.remove('d-none');
                term.writeln('\r\n\x1b[33m╔═══════════════════════════════════════════════════════════╗\x1b[0m');
                term.writeln('\x1b[33m║                   Session Terminated                       ║\x1b[0m');
                term.writeln('\x1b[33m╚═══════════════════════════════════════════════════════════╝\x1b[0m\r\n');
            });

            socket.on('disconnect', () => {
                if (connected) {
                    connected = false;
                    connecting = false;
                    setStatus('disconnected', 'Socket lost');
                    term.writeln('\x1b[1;31m\r\n[!] Connection to panel lost. Reconnecting...\x1b[0m');
                }
            });

            // --- terminal input handling ---
            term.onData(data => {
                if (!connected) return;
                socket.emit('ssh_input', { vps_id: vpsId, input: data });
            });

            // --- connect button logic ---
            function initiateConnection() {
                if (connecting) return;
                const host = sshHost.value.trim();
                const port = parseInt(sshPort.value, 10) || 22;
                const user = sshUser.value.trim() || 'root';
                const pass = sshPass.value.trim();

                if (!host) {
                    alert('Please enter VPS IP or hostname');
                    return;
                }
                if (!pass) {
                    alert('Password is required');
                    return;
                }

                connecting = true;
                connected = false;
                setStatus('connecting', 'SSH handshake');
                overlay.classList.add('d-none');

                term.clear();
                term.writeln('\x1b[36m╔═══════════════════════════════════════════════════════════╗\x1b[0m');
                term.writeln('\x1b[36m║              Establishing SSH Connection...                ║\x1b[0m');
                term.writeln('\x1b[36m╚═══════════════════════════════════════════════════════════╝\x1b[0m');
                term.writeln('\r\n\x1b[36mConnecting to ' + user + '@' + host + ':' + port + ' ...\x1b[0m\r\n');

                socket.emit('ssh_connect', {
                    vps_id: vpsId,
                    host: host,
                    port: port,
                    username: user,
                    password: pass
                });
            }

            connectBtn.addEventListener('click', initiateConnection);

            reconnectBtn.addEventListener('click', () => {
                if (connected) {
                    socket.emit('ssh_disconnect', { vps_id: vpsId });
                }
                connected = false;
                connecting = false;
                overlay.classList.remove('d-none');
                setStatus('disconnected', 'Ready');
                term.clear();
                fetchConnectionDetails();
            });

            exitBtn.addEventListener('click', () => {
                if (connected) {
                    socket.emit('ssh_disconnect', { vps_id: vpsId });
                }
                window.location.href = `/vps/${vpsId}`;
            });

            fullscreenBtn.addEventListener('click', () => {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen();
                } else {
                    if (document.exitFullscreen) {
                        document.exitFullscreen();
                    }
                }
            });

            window.addEventListener('resize', () => {
                if (term && fitAddon) {
                    fitAddon.fit();
                    if (connected) {
                        const dims = fitAddon.proposeDimensions();
                        if (dims) {
                            socket.emit('ssh_resize', {
                                vps_id: vpsId,
                                cols: dims.cols,
                                rows: dims.rows
                            });
                        }
                    }
                }
            });

            document.addEventListener('keydown', (e) => {
                if (e.key === 'F11') {
                    e.preventDefault();
                    fullscreenBtn.click();
                }
                if (e.ctrlKey && e.shiftKey && e.key === 'V') {
                    e.preventDefault();
                    navigator.clipboard.readText().then(text => {
                        if (connected && text) {
                            socket.emit('ssh_input', { vps_id: vpsId, input: text });
                        }
                    }).catch(() => {});
                }
            });

            sshPass.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    connectBtn.click();
                }
            });

            setStatus('disconnected', 'Initializing...');

            window.addEventListener('beforeunload', () => {
                if (connected) {
                    socket.emit('ssh_disconnect', { vps_id: vpsId });
                }
            });
        })();
    </script>

    <!-- In case xterm fit addon not fully loaded, retry fit after 200ms -->
    <script>
        (function secondaryFit() {
            setTimeout(() => {
                if (window.fitAddon) {
                    try { window.fitAddon.fit(); } catch(e) {}
                } else {
                    // try to get from global scope if available
                    if (typeof FitAddon !== 'undefined' && term) {
                        try { 
                            const fit = new FitAddon.FitAddon();
                            term.loadAddon(fit);
                            fit.fit();
                            window.fitAddon = fit;
                        } catch (e) {}
                    }
                }
            }, 200);
        })();
    </script>
</body>
</html>
