<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 - Server Error</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #020408;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            max-width: 620px;
            width: 90%;
            text-align: center;
            padding: 3rem 2rem;
            border: 1px solid rgba(255,0,85,0.3);
            border-radius: 16px;
            background: rgba(10,12,18,0.8);
            box-shadow: 0 0 40px rgba(255,0,85,0.1);
        }
        .icon { color: #ff0055; font-size: 4rem; margin-bottom: 1.5rem; opacity: 0.85; }
        h1 { font-size: 5rem; font-weight: 900; color: #ff0055; letter-spacing: -3px; line-height: 1; margin-bottom: 0.5rem; }
        h2 { font-size: 1.5rem; font-weight: 800; text-transform: uppercase; margin-bottom: 1rem; }
        p { color: #a0aec0; margin-bottom: 2rem; line-height: 1.6; }
        .code { color: #ff0055; font-family: monospace; font-size: 0.85rem; }
        .actions { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 10px;
            font-weight: 700;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            border: none;
            font-size: 0.9rem;
        }
        .btn-outline { background: transparent; border: 1px solid #ff0055; color: #ff0055; }
        .btn-primary { background: #ff0055; color: #fff; }
        .error-log {
            margin-top: 2rem;
            text-align: left;
            background: rgba(0,0,0,0.4);
            padding: 1.25rem;
            border-radius: 10px;
            border: 1px solid rgba(255,0,85,0.15);
        }
        .error-log p { color: #ff0055; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; margin-bottom: 0.5rem; }
        .error-log pre { font-family: monospace; font-size: 0.72rem; color: #a0aec0; overflow-x: auto; white-space: pre-wrap; word-break: break-all; max-height: 300px; overflow-y: auto; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon"><i class="fas fa-microchip"></i></div>
        <h1>500</h1>
        <h2>Core Meltdown Detected</h2>
        <p>
            A critical system failure has occurred in our reactor core.<br>
            <span class="code">[ERROR_CODE: 0x500_INTERNAL_FAILURE]</span>
        </p>
        <div class="actions">
            <a href="javascript:location.reload()" class="btn btn-outline">
                <i class="fas fa-sync-alt"></i> REBOOT
            </a>
            <a href="/" class="btn btn-primary">
                <i class="fas fa-home"></i> EVACUATE
            </a>
        </div>
        {% if error %}
        <div class="error-log">
            <p>System Log (Admin only):</p>
            <pre>{{ error }}</pre>
        </div>
        {% endif %}
    </div>
</body>
</html>
