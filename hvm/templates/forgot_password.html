<!-- templates/forgot_password.html -->
{% extends "base.html" %}

{% block title %}Forgot Password - {{ panel_name }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-md-6 col-lg-4">
        <div class="card">
            <div class="card-body p-4">
                <!-- Header -->
                <div class="text-center mb-4">
                    <div class="bg-warning bg-opacity-10 p-3 rounded-circle d-inline-block mb-3">
                        <i class="bi bi-key fs-1 text-warning"></i>
                    </div>
                    <h4 class="mb-2">Forgot Password?</h4>
                    <p class="text-secondary">Enter your email and we'll send you a reset link</p>
                </div>

                <!-- Forgot Password Form -->
                <form method="POST" action="{{ url_for('forgot_password') }}">
                    <div class="mb-4">
                        <label class="form-label">Email Address</label>
                        <div class="input-group">
                            <span class="input-group-text bg-dark border-custom text-secondary">
                                <i class="bi bi-envelope"></i>
                            </span>
                            <input type="email" class="form-control bg-dark text-light border-custom" 
                                   name="email" required autofocus>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-accent w-100 py-2 mb-3">
                        <i class="bi bi-send me-1"></i>
                        Send Reset Link
                    </button>
                    
                    <div class="text-center">
                        <a href="{{ url_for('login') }}" class="text-secondary small">
                            <i class="bi bi-arrow-left me-1"></i>
                            Back to Login
                        </a>
                    </div>
                </form>

                <!-- Info -->
                <div class="mt-4 text-center">
                    <small class="text-secondary">
                        <i class="bi bi-clock-history me-1"></i>
                        Reset links expire in 1 hour
                    </small>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .btn-accent {
        background: var(--accent-primary);
        border-color: var(--accent-primary);
        color: white;
    }
    
    .btn-accent:hover {
        background: #2563eb;
        border-color: #2563eb;
        color: white;
    }
    
    .border-custom {
        border-color: var(--border-color) !important;
    }
    
    .input-group-text {
        border-right: none;
    }
    
    .input-group .form-control {
        border-left: none;
    }
    
    .input-group:focus-within .input-group-text {
        border-color: var(--accent-primary);
    }
    
    .input-group:focus-within .form-control {
        border-color: var(--accent-primary);
    }
</style>
{% endblock %}
